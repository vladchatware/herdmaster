included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - Design
  - Resources

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - last_where
  - sorted_first_last
  - unused_optional_binding
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - convenience_type
  - prefer_self_type_over_type_of_self
  - toggle_bool

disabled_rules:
  - todo
  - line_length

identifier_name:
  min_length: 2
  excluded: [id, x, y, n]

type_name:
  min_length: 3
  max_length: 60
