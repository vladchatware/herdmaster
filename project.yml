# xcodegen config — regenerate Xcode project from this file with: make xcode
name: HerdMaster
options:
  bundleIdPrefix: com.darkhorse
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEAD_CODE_STRIPPING: YES

packages:
  HerdMaster:
    path: .

targets:
  HerdMaster:
    type: application
    platform: iOS
    sources:
      - path: Sources/HerdMasterApp
    dependencies:
      - package: HerdMaster
        product: HerdMasterUI
      - package: HerdMaster
        product: HerdMasterCore
    info:
      path: Sources/HerdMasterApp/Info.plist
      properties:
        CFBundleDisplayName: HerdMaster
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.darkhorse.HerdMaster
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Darkhorse Tech Solution"
    entitlements:
      path: Sources/HerdMasterApp/HerdMaster.entitlements
      properties:
        com.apple.developer.icloud-services: [CloudKit]
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.darkhorse.HerdMaster
